github:
  owner: example-org
  repo: example-repo
queue:
  sqlite:
    path: ./issueq.db
routes:
  - name: bug-triage
    when:
      labels_include: [agent-ready, agent-route-bug-triage]
      labels_exclude: [agent-running, agent-done, agent-failed, agent-needs-human]
    job:
      kind: bug-triage
      command: ["./tasks/triage.sh"]
      timeout: 10m
      concurrency: 1
      max_attempts: 2

  - name: bug-fix-pr
    when:
      labels_include: [agent-ready, agent-route-bug-fix-pr, agent-write-approved]
      labels_exclude: [agent-running, agent-done, agent-failed, agent-needs-human, manual-only]
    gate:
      handoff:
        required: true
        from: [bug-triage]
        decisions: [bug_fix_candidate, reproducible]
        next_route: true
        freshness: source_unchanged
      on_block:
        labels_remove: [agent-ready, agent-running]
        labels_add: [agent-needs-human]
        comment: "issueq route blocked: {{ gate.reason }}"
    job:
      kind: bug-fix-pr
      command: ["./tasks/bug-fix-pr.sh"]
      timeout: 40m
      concurrency: 1
      max_attempts: 1
      attempt_scope: handoff

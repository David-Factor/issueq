name: issueq issue event bridge
description: Create or update GitHub issues that route GitHub events into issueq.
inputs:
  github-token:
    description: Token used to read context and write issues.
    required: true
    default: ${{ github.token }}
  marker:
    description: Hidden marker template used to find/create a single bridge issue. Supports {{...}} placeholders from context-json.
    required: true
  title:
    description: Issue title template. Supports {{...}} placeholders from context-json.
    required: true
  body:
    description: Issue body template. Supports {{...}} placeholders from context-json.
    required: true
  context-json:
    description: JSON object used for template interpolation. If omitted, a workflow_run context object is inferred.
    required: false
    default: ""
  routing-labels:
    description: Comma or newline separated labels to apply to the bridge issue.
    required: false
    default: ""
  ready-label:
    description: Label that makes issueq eligible to route the issue.
    required: false
    default: agent-ready
  apply-ready:
    description: When true, apply the ready label subject to attempt and generated branch gates.
    required: false
    default: "false"
  max-attempts:
    description: Maximum automated ready-label attempts for the bridge marker.
    required: false
    default: "2"
  human-labels:
    description: Comma or newline separated labels to apply when max attempts are exhausted.
    required: false
    default: "agent-needs-human,manual-only"
  generated-branch:
    description: Branch name to compare with generated-branch-prefixes before applying ready-label.
    required: false
    default: ""
  generated-branch-prefixes:
    description: Comma or newline separated branch prefixes that should not receive the ready label automatically.
    required: false
    default: "issueq/,agent/,codex/"
outputs:
  issue-number:
    description: Created or updated issue number.
  issue-url:
    description: Created or updated issue URL.
  marker:
    description: Rendered hidden idempotency marker.
  ready-applied:
    description: Whether the ready label was applied.
  attempt:
    description: Bridge attempt count for the rendered marker.
runs:
  using: node20
  main: bridge.mjs
